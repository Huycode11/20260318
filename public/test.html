<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>API Tester</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        section { margin-bottom: 20px; border: 1px solid #ccc; padding: 10px; border-radius: 8px; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
        label { display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>API Verification</h1>
    
    <section id="register">
        <h2>1. Register</h2>
        <button onclick="register()">Register (huy1, Pass123@)</button>
        <pre id="register-res"></pre>Section>

    <section id="login">
        <h2>2. Login</h2>
        <button onclick="login()">Login</button>
        <pre id="login-res"></pre>Section>

    <section id="me">
        <h2>3. /me</h2>
        <button onclick="getMe()">Get Me</button>
        <pre id="me-res"></pre>Section>

    <section id="changepass">
        <h2>4. Change Password</h2>
        <button onclick="changePass()">Change Password (to NewPass123@)</button>
        <pre id="changepass-res"></pre>Section>

    <script>
        let token = '';

        async function register() {
            const res = await fetch('/api/v1/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'huy1', password: 'Pass123@', email: 'huy1@example.com' })
            });
            document.getElementById('register-res').innerText = JSON.stringify(await res.json(), null, 2);
        }

        async function login() {
            const res = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'huy1', password: 'Pass123@' })
            });
            token = await res.text();
            document.getElementById('login-res').innerText = token;
        }

        async function getMe() {
            const res = await fetch('/api/v1/auth/me', {
                headers: { 'Authorization': token }
            });
            document.getElementById('me-res').innerText = JSON.stringify(await res.json(), null, 2);
        }

        async function changePass() {
            const res = await fetch('/api/v1/auth/changepassword', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify({ oldpassword: 'Pass123@', newpassword: 'NewPass123@' })
            });
            document.getElementById('changepass-res').innerText = JSON.stringify(await res.json(), null, 2);
        }
    </script>
</body>
</html>
